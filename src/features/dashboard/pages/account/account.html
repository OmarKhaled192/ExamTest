<app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

<div class="account-page">
  <app-page-header title="Account Settings" [icon]="headerIcon" backPath="/dashboard"></app-page-header>

  <div class="account-layout">
    <!-- Left panel -->
    <aside class="account-sidebar">
      <button class="account-tab" [class.account-tab--active]="activeTab() === 'profile'" (click)="setTab('profile')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Profile
      </button>
      <button class="account-tab" [class.account-tab--active]="activeTab() === 'password'" (click)="setTab('password')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Change Password
      </button>

      <div class="account-sidebar__spacer"></div>

      <button class="account-tab account-tab--logout" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16,17 21,12 16,7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </aside>

    <!-- Right panel -->
    <div class="account-content">
      <!-- Profile Tab -->
      <div *ngIf="activeTab() === 'profile'" class="profile-form">
        <div class="form-row">
          <div class="form-field">
            <label>First name</label>
            <input type="text" [(ngModel)]="profile.firstName" placeholder="First name">
          </div>
          <div class="form-field">
            <label>Last name</label>
            <input type="text" [(ngModel)]="profile.lastName" placeholder="Last name">
          </div>
        </div>

        <div class="form-field">
          <label>Username</label>
          <input type="text" [(ngModel)]="profile.username" placeholder="Username">
        </div>

        <div class="form-field">
          <label>Email</label>
          <input type="email" [(ngModel)]="profile.email" placeholder="Email">
        </div>

        <div class="form-field">
          <label>Phone</label>
          <div class="phone-input">
            <select [(ngModel)]="profile.countryCode" class="phone-code">
              <option *ngFor="let code of countryCodes" [value]="code">{{ code }}</option>
            </select>
            <input type="tel" [(ngModel)]="profile.phone" placeholder="Phone number" class="phone-number">
          </div>
        </div>

        <div class="profile-form__actions">
          <main-btn color="ghost" (click)="deleteModalOpen.set(true)">Delete My Account</main-btn>
          <main-btn color="primary" [loading]="savingProfile()" (click)="saveProfile()">Save Changes</main-btn>
        </div>
      </div>

      <!-- Password Tab -->
      <div *ngIf="activeTab() === 'password'" class="password-form">
        <div class="form-field">
          <label>Current Password</label>
          <div class="pw-input">
            <input [type]="showCurrentPw() ? 'text' : 'password'" [(ngModel)]="passwords.current"
              placeholder="••••••••">
            <button class="pw-toggle" (click)="showCurrentPw.set(!showCurrentPw())"
              [innerHTML]="showCurrentPw() ? eyeOffIcon : eyeIcon"></button>
          </div>
        </div>

        <div class="form-field">
          <label>New Password</label>
          <div class="pw-input">
            <input [type]="showNewPw() ? 'text' : 'password'" [(ngModel)]="passwords.new" placeholder="••••••••">
            <button class="pw-toggle" (click)="showNewPw.update(v => !v)"
              [innerHTML]="showNewPw() ? eyeOffIcon : eyeIcon"></button>
          </div>
        </div>

        <div class="form-field">
          <label>Confirm New Password</label>
          <div class="pw-input">
            <input [type]="showConfirmPw() ? 'text' : 'password'" [(ngModel)]="passwords.confirm"
              placeholder="••••••••">
            <button class="pw-toggle" (click)="showConfirmPw.update(v => !v)"
              [innerHTML]="showConfirmPw() ? eyeOffIcon : eyeIcon"></button>
          </div>
        </div>

        <div class="pw-error" *ngIf="passwordError()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </svg>
          {{ passwordError() }}
        </div>

        <main-btn color="primary" [fullWidth]="true" (click)="updatePassword()">Update Password</main-btn>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<app-modal [isOpen]="deleteModalOpen()" (close)="deleteModalOpen.set(false)">
  <div class="delete-modal">
    <div class="delete-modal__icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    </div>
    <h3 class="delete-modal__title">Are you sure you want to delete your account?</h3>
    <p class="delete-modal__desc">This action is permanent and cannot be undone.</p>
    <div class="delete-modal__actions">
      <button class="delete-modal__cancel" (click)="deleteModalOpen.set(false)">Cancel</button>
      <button class="delete-modal__confirm" (click)="confirmDelete()">Yes, delete</button>
    </div>
  </div>
</app-modal>

<!-- Success Toast -->
<div class="toast toast--success" *ngIf="passwordSuccess()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5">
    <polyline points="20,6 9,17 4,12" />
  </svg>
  Your password has been updated.
</div>
