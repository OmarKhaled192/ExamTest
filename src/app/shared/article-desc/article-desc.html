<div class="flex gap-4">

  <div class="text-xl">
    <img [src]="iconPath" alt="icon" class="w-6 h-6 object-contain" />
  </div>

  <div class="content">
    <h3 class="font-semibold text-blue-600 text-[20px] leading-[100%] tracking-[0px] align-middle font-geist-mono">
      {{ title }}
    </h3>
    <p class="font-normal text-gray-600 text-[16px] leading-[100%] tracking-[0px] align-middle font-geist-mono">
      {{ description }}
    </p>
  </div>

</div>
