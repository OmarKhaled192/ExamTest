<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <!-- Toggle Button -->
  <button class="sidebar__toggle" (click)="toggleSidebar()" [title]="collapsed() ? 'Expand' : 'Collapse'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      [style.transform]="collapsed() ? 'rotate(180deg)' : 'rotate(0deg)'">
      <polyline points="15,18 9,12 15,6"/>
    </svg>
  </button>

  <!-- Logo -->
  <div class="sidebar__logo">
    <div class="sidebar__logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>
      </svg>
    </div>
    <div class="sidebar__logo-text" *ngIf="!collapsed()">
      <span class="sidebar__logo-name">ELEVATE</span>
      <span class="sidebar__logo-sub">Exam App</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="sidebar__nav-item--active"
      class="sidebar__nav-item"
      [title]="collapsed() ? item.label : ''"
    >
      <span class="sidebar__nav-icon" [innerHTML]="item.icon"></span>
      <span class="sidebar__nav-label" *ngIf="!collapsed()">{{ item.label }}</span>
    </a>
  </nav>

  <!-- User Profile -->
  <div class="sidebar__user">
    <div class="sidebar__user-trigger" (click)="toggleUserMenu()">
      <div class="sidebar__avatar">
        <img *ngIf="user.avatar" [src]="user.avatar" [alt]="user.firstName">
        <span *ngIf="!user.avatar">{{ user.firstName[0] }}</span>
      </div>
      <div class="sidebar__user-info" *ngIf="!collapsed()">
        <span class="sidebar__user-name">{{ user.firstName }}</span>
        <span class="sidebar__user-email">{{ user.email }}</span>
      </div>
      <button class="sidebar__user-menu-btn" *ngIf="!collapsed()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- User Dropdown Menu -->
    <div class="sidebar__user-dropdown" *ngIf="userMenuOpen() && !collapsed()">
      <a [routerLink]="'/dashboard/account'" class="sidebar__dropdown-item" (click)="userMenuOpen.set(false)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        Account
      </a>
      <button class="sidebar__dropdown-item sidebar__dropdown-item--danger" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </div>
</aside>
