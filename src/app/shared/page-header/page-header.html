<div class="flex items-stretch mb-6 gap-2 overflow-hidden  rounded-none">

  <!-- Back button -->
  <a *ngIf="backPath" [routerLink]="backPath" class="flex border border-blue-600 items-center justify-center w-8 flex-shrink-0
            bg-white border-r border-blue-600
            text-blue-600 hover:bg-blue-50
            transition-colors duration-150">

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="#155DFC" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
    </svg>

  </a>

  <!-- Blue title bar -->
  <div class="flex items-center border border-blue-600 gap-3 flex-1 bg-blue-600 px-7 py-4">
    <span class="flex items-center text-white opacity-90" [innerHTML]="icon"></span>

    <h1 class="font-mono font-bold text-2xl text-white tracking-tight">
      {{ title }}
    </h1>
  </div>

</div>
