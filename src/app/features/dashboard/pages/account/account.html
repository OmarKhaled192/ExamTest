<app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

<div class="px-6 pb-8">
  <app-page-header title="Account Settings" [icon]="headerIcon" backPath="/dashboard"></app-page-header>

  <!-- Card with left sidebar tabs + right content -->
  <div class="flex bg-white border border-gray-100 rounded-xl overflow-hidden min-h-[520px]">

    <!-- ── Left tab panel ── -->
    <div class="w-52 flex-shrink-0 flex flex-col border-r border-gray-100 p-3">
      <!-- Profile tab -->
      <button (click)="setTab('profile')"
        class="flex items-center cursor-pointer gap-2.5 px-3 py-2.5 rounded-lg font-mono text-sm text-left w-full transition-colors duration-150"
        [class]="activeTab() === 'profile'
          ? 'tab-btn bg-blue-50 text-blue-600 font-medium'
          : 'text-gray-400 hover:bg-gray-50 hover:text-gray-600'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M18 20C18 18.4087 17.3679 16.8826 16.2426 15.7574C15.1174 14.6321 13.5913 14 12 14M12 14C10.4087 14 8.88258 14.6321 7.75736 15.7574C6.63214 16.8826 6 18.4087 6 20M12 14C14.2091 14 16 12.2091 16 10C16 7.79086 14.2091 6 12 6C9.79086 6 8 7.79086 8 10C8 12.2091 9.79086 14 12 14ZM22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z"
            stroke="#6B7280" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Profile
      </button>

      <!-- Change Password tab -->
      <button (click)="setTab('password')"
        class=" flex items-center cursor-pointer gap-2.5 px-3 py-2.5 rounded-lg font-mono text-sm text-left w-full transition-colors duration-150"
        [class]="activeTab() === 'password'
          ? 'tab-btn bg-blue-50 text-blue-600 font-medium'
          : 'text-gray-400 hover:bg-gray-50 hover:text-gray-600'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11M5 11H19C20.1046 11 21 11.8954 21 13V20C21 21.1046 20.1046 22 19 22H5C3.89543 22 3 21.1046 3 20V13C3 11.8954 3.89543 11 5 11Z"
            stroke="#6B7280" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Change Password
      </button>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Logout button at bottom -->
      <button (click)="logout()"
        class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg font-mono text-sm text-red-500 bg-red-50 hover:bg-red-100 transition-colors duration-150 w-full text-left">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M8 17L3 12M3 12L8 7M3 12H15M15 21H19C19.5304 21 20.0391 20.7893 20.4142 20.4142C20.7893 20.0391 21 19.5304 21 19V5C21 4.46957 20.7893 3.96086 20.4142 3.58579C20.0391 3.21071 19.5304 3 19 3H15"
            stroke="#DC2626" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Logout
      </button>
    </div>

    <!-- ── Right content area ── -->
    <div class="flex-1 p-8">

      <!-- ══ PROFILE TAB ══ -->
      <div *ngIf="activeTab() === 'profile'">
        <!-- First + Last name row -->
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block font-mono text-sm text-gray-600 mb-1.5">First name</label>
            <input type="text" [(ngModel)]="profile.firstName"
              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
          </div>
          <div>
            <label class="block font-mono text-sm text-gray-600 mb-1.5">Last name</label>
            <input type="text" [(ngModel)]="profile.lastName"
              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
          </div>
        </div>

        <!-- Username -->
        <div class="mb-4">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">Username</label>
          <input type="text" [(ngModel)]="profile.username"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">Email</label>
          <input type="email" [(ngModel)]="profile.email"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
        </div>

        <!-- Phone with country code -->
        <div class="mb-8">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">Phone</label>
          <div
            class="flex border border-gray-200 rounded-lg overflow-hidden focus-within:border-blue-400 transition-colors duration-150">
            <div class="flex items-center gap-1.5 px-3 border-r border-gray-200 bg-white flex-shrink-0">
              <!-- EG flag emoji approximation -->
              <select [(ngModel)]="profile.countryCode"
                class="font-mono text-sm text-gray-700 bg-transparent focus:outline-none pr-1 appearance-none cursor-pointer">
                <option *ngFor="let c of countryCodes" [value]="c">{{ c }}</option>
              </select>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
                <polyline points="6,9 12,15 18,9" />
              </svg>
            </div>
            <input type="tel" [(ngModel)]="profile.phone"
              class="flex-1 px-4 py-2.5 font-mono text-sm text-gray-800 focus:outline-none">
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3">
          <button (click)="deleteModalOpen.set(true)"
            class="flex-1 py-3 rounded-lg bg-red-50 text-red-500 font-mono text-sm font-medium hover:bg-red-100 transition-colors duration-150 border border-red-100">
            Delete My Account
          </button>
          <button (click)="saveProfile()"
            class="flex-1 py-3 rounded-lg bg-blue-600 text-white font-mono text-sm font-medium hover:bg-blue-700 transition-colors duration-150 flex items-center justify-center gap-2">
            <span *ngIf="saving()"
              class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span *ngIf="!saving()">Save Changes</span>
          </button>
        </div>
      </div>

      <!-- ══ CHANGE PASSWORD TAB ══ -->
      <div *ngIf="activeTab() === 'password'">

        <!-- Current Password -->
        <div class="mb-4">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">Current Password</label>
          <div class="relative">
            <input [type]="showCurrent() ? 'text' : 'password'" [(ngModel)]="passwords.current" placeholder="••••••••"
              class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
            <button type="button" (click)="showCurrent.set(!showCurrent())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showCurrent()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <svg *ngIf="showCurrent()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- New Password -->
        <div class="mb-4">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">New Password</label>
          <div class="relative">
            <input [type]="showNew() ? 'text' : 'password'" [(ngModel)]="passwords.newPw" placeholder="••••••••"
              class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
            <button type="button" (click)="showNew.set(!showNew())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showNew()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <svg *ngIf="showNew()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm New Password -->
        <div class="mb-4">
          <label class="block font-mono text-sm text-gray-600 mb-1.5">Confirm New Password</label>
          <div class="relative">
            <input [type]="showConfirm() ? 'text' : 'password'" [(ngModel)]="passwords.confirm" placeholder="••••••••"
              class="w-full px-4 py-2.5 pr-11 border border-gray-200 rounded-lg font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-400 transition-colors duration-150">
            <button type="button" (click)="showConfirm.set(!showConfirm())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showConfirm()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <svg *ngIf="showConfirm()" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Error banner (Change_Password__Error.png) -->
        <div *ngIf="pwError()"
          class="flex items-center gap-2 px-4 py-3 mb-4 bg-red-50 border border-red-200 rounded-lg font-mono text-sm text-red-500">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </svg>
          {{ pwError() }}
        </div>

        <!-- Update Password button -->
        <button (click)="updatePassword()"
          class="w-full py-3 rounded-lg bg-blue-600 text-white font-mono text-sm font-medium hover:bg-blue-700 transition-colors duration-150">
          Update Password
        </button>
      </div>

    </div><!-- /right content -->
  </div><!-- /card -->
</div>

<!-- ══ Delete Account Modal (Account___Delete_Account.png) ══ -->
<app-modal [isOpen]="deleteModalOpen()" (close)="deleteModalOpen.set(false)">
  <div class="flex flex-col items-center text-center px-8 pt-10 pb-0">
    <!-- Warning icon circle -->
    <div class="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center mb-5">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    </div>
    <h3 class="font-mono font-bold text-red-500 text-base mb-2">Are you sure you want to delete your account?</h3>
    <p class="font-mono text-sm text-gray-500 mb-0">This action is permanent and cannot be undone.</p>
  </div>
  <!-- Actions -->
  <div class="flex gap-3 px-8 py-6 mt-4 border-t border-gray-100">
    <button (click)="deleteModalOpen.set(false)"
      class="flex-1 py-3 rounded-lg bg-gray-100 text-gray-700 font-mono text-sm font-semibold hover:bg-gray-200 transition-colors duration-150">
      Cancel
    </button>
    <button (click)="confirmDelete()"
      class="flex-1 py-3 rounded-lg bg-red-500 text-white font-mono text-sm font-semibold hover:bg-red-600 transition-colors duration-150">
      Yes, delete
    </button>
  </div>
</app-modal>

<!-- ══ Success toast (Change_Password__Success.png) — bottom-right dark pill ══ -->
<div *ngIf="pwSuccess()"
  class="fixed bottom-6 right-6 z-50 flex items-center gap-2.5 px-5 py-3.5 bg-gray-900 text-white font-mono text-sm rounded-xl shadow-2xl"
  style="animation: slideInRight 0.3s cubic-bezier(0.34,1.56,0.64,1);">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5">
    <polyline points="20,6 9,17 4,12" />
  </svg>
  Your password has been updated.
</div>

<style>
  @keyframes slideInRight {
    from {
      opacity: 0;
      transform: translateX(24px);
    }

    to {
      opacity: 1;
      transform: none;
    }
  }
</style>
