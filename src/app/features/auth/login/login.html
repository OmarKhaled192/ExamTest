<div class="form-card">
  <h2 class="form-title">Login</h2>

  <div class="field-group">
    <label class="field-label">Username</label>
    <input [(ngModel)]="username" type="text" placeholder="user123" class="field-input"
      [class.field-input--error]="errors.username" />
    <span *ngIf="errors.username" class="field-error">{{ errors.username }}</span>
  </div>

  <div class="field-group">
    <label class="field-label">Password</label>
    <div class="password-wrapper">
      <input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
        class="field-input" [class.field-input--error]="errors.password" />
      <span class="eye-icon" (click)="showPassword = !showPassword">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </div>
    <span *ngIf="errors.password" class="field-error">{{ errors.password }}</span>
  </div>

  <forgot-link link="/auth/forgot-password" label="Forgot your password?"></forgot-link>

  <div *ngIf="globalError" class="global-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10" />
      <line x1="15" y1="9" x2="9" y2="15" />
      <line x1="9" y1="9" x2="15" y2="15" />
    </svg>
    {{ globalError }}
  </div>

  <main-btn color="primary" type="submit" (click)="onLogin()">Login</main-btn>

  <question-link question="Don't have an account?" linkLabel="Create yours" link="/auth/register">
  </question-link>
</div>
