<form [formGroup]="loginForm" class="form-card" (ngSubmit)="onLogin()">
  <h2 class="form-title">Login</h2>

  <!-- Username -->
  <div class="field-group">
    <label class="field-label" for="username">Username</label>
    <input id="username" type="text" placeholder="user123" formControlName="username" class="field-input"
      [class.field-input--error]="f['username'].invalid && (f['username'].touched || f['username'].dirty)" />
    <span *ngIf="f['username'].invalid && (f['username'].touched || f['username'].dirty)" class="field-error">
      Username is required
    </span>
  </div>

  <!-- Password -->
  <div class="field-group">
    <label class="field-label" for="password">Password</label>
    <div class="password-wrapper">
      <input id="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" formControlName="password"
        class="field-input"
        [class.field-input--error]="f['password'].invalid && (f['password'].touched || f['password'].dirty)" />
      <span class="eye-icon" (click)="showPassword = !showPassword" type="button">
        <!-- eye icon SVG -->
      </span>
    </div>
    <span *ngIf="f['password'].invalid && (f['password'].touched || f['password'].dirty)" class="field-error">
      Password is required
    </span>
  </div>

  <!-- Forgot password -->
  <forgot-link link="/auth/forgot-password" label="Forgot your password?"></forgot-link>

  <!-- Global error -->
  <div *ngIf="globalError" class="global-error">
    {{ globalError }}
  </div>

  <!-- Submit button -->
  <main-btn color="primary" [fullWidth]="true" type="submit">Login</main-btn>

  <!-- Signup link -->
  <question-link question="Don't have an account?" linkLabel="Create yours" link="/auth/register"></question-link>
</form>
