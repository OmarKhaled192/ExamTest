<div class="form-card">
  <h2 class="form-title">Create Account</h2>

  <div class="field-row">
    <div class="field-group">
      <label class="field-label">First name</label>
      <input [(ngModel)]="firstName" type="text" placeholder="Ahmed" class="field-input" />
    </div>
    <div class="field-group">
      <label class="field-label">Last name</label>
      <input [(ngModel)]="lastName" type="text" placeholder="Abdullah" class="field-input" />
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Username</label>
    <input [(ngModel)]="username" type="text" placeholder="user123" class="field-input" />
  </div>

  <div class="field-group">
    <label class="field-label">Email</label>
    <input [(ngModel)]="email" type="email" placeholder="user@example.com" class="field-input" />
  </div>

  <div class="field-group">
    <label class="field-label">Phone</label>
    <div class="phone-wrapper">
      <span class="phone-prefix">������ EG(+20) ◇</span>
      <input [(ngModel)]="phone" type="tel" placeholder="1012345678" class="field-input phone-input" />
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Password</label>
    <div class="password-wrapper">
      <input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
        class="field-input" />
      <span class="eye-icon" (click)="showPassword = !showPassword">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Confirm Password</label>
    <div class="password-wrapper">
      <input [(ngModel)]="confirmPassword" [type]="showConfirm ? 'text' : 'password'" placeholder="••••••••"
        class="field-input" />
      <span class="eye-icon" (click)="showConfirm = !showConfirm">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </div>
  </div>

  <main-btn color="primary" type="submit" (click)="onRegister()">Create Account</main-btn>

  <question-link question="Already have an account?" linkLabel="Login" link="/auth/login">
  </question-link>
</div>
