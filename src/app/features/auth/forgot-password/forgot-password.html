<form class="form-card" [formGroup]="form">
  <h2 class="form-title">Forgot Password</h2>
  <p class="sub-text">Don't worry, we will help you recover your account.</p>

  <div class="field-group">
    <label class="field-label">Email</label>
    <input formControlName="email" type="email" placeholder="user@example.com" class="field-input" />
  </div>

  <main-btn color="primary" (click)="onContinue()" [fullWidth]="true" [loading]="loading">
    <span class="text">
      Continue
    </span>
    <span class="icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M13.5 6L16.5 9M16.5 9L13.5 12M16.5 9H1.5" stroke="white" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </span>
  </main-btn>

  <question-link question="Don't have an account?" linkLabel="Create yours" link="/auth/register">
  </question-link>
</form>
