<div class="form-card">
  <h2 class="form-title">Forgot Password</h2>
  <p class="sub-text">Don't worry, we will help you recover your account.</p>

  <div class="field-group">
    <label class="field-label">Email</label>
    <input [(ngModel)]="email" type="email" placeholder="user@example.com" class="field-input" />
  </div>

  <main-btn color="primary" (click)="onContinue()">Continue →</main-btn>

  <question-link question="Don't have an account?" linkLabel="Create yours" link="/register"></question-link>
</div>
