<div class="form-card">
  <h2 class="form-title">Create a New Password</h2>
  <p class="sub-text">Create a new strong password for your account.</p>

  <div class="field-group">
    <label class="field-label">New Password</label>
    <div class="password-wrapper">
      <input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
        class="field-input" />
      <span class="eye-icon" (click)="showPassword = !showPassword">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Confirm New Password</label>
    <div class="password-wrapper">
      <input [(ngModel)]="confirmPassword" [type]="showConfirm ? 'text' : 'password'" placeholder="••••••••"
        class="field-input" />
      <span class="eye-icon" (click)="showConfirm = !showConfirm">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      </span>
    </div>
  </div>

  <main-btn color="primary" (click)="onReset()">Reset Password</main-btn>

  <question-link question="Don't have an account?" linkLabel="Create yours" link="/auth/register"></question-link>
</div>
