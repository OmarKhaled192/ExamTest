<div class="form-card">
  <button class="back-btn" (click)="goBack()">←</button>
  <h2 class="form-title">Password Reset Sent</h2>
  <p class="info-text">We have sent a password reset link to: <a class="email-link">{{ email }}</a>.</p>
  <p class="info-text">Please check your inbox and follow the instructions to reset your password.</p>
  <p class="hint-text">If you don't see the email within a few minutes, check your spam or junk folder.</p>
  <div class="w-100 flex">
    <question-link question="Don't have an account?" linkLabel="Create yours" link="/register"></question-link>
  </div>
</div>
