<div class="auth-wrapper">

  <!-- Left Section -->
  <section class="left-panel">
    <div class="left-inner">

      <!-- Logo -->
      <div class="logo-area">
        <main-title></main-title>
      </div>

      <!-- Hero Text + Features -->
      <div class="hero-content">
        <h1 class="hero-title">
          Empower your learning journey<br>
          with our smart exam platform.
        </h1>

        <div class="all-articles">
          <article-desc iconPath="/icons/TailoredDiplomas.svg" title="Tailored Diplomas"
            description="Choose from specialized tracks like Frontend, Backend, and Mobile Development.">
          </article-desc>

          <article-desc iconPath="/icons/FocusedExams.svg" title="Focused Exams"
            description="Access topic-specific tests including HTML, CSS, JavaScript, and more.">
          </article-desc>

          <article-desc iconPath="/icons/SmartMultiStepForms.svg" title="Smart Multi-Step Forms"
            description="Choose from specialized tracks like Frontend, Backend, and Mobile Development.">
          </article-desc>
        </div>
      </div>

    </div>
  </section>

  <!-- Right Section -->
  <section class="right-panel">
    <div class="form-card">

      <h2 class="form-title">Login</h2>

      <!-- Username -->
      <div class="field-group">
        <label class="field-label">Username</label>
        <input type="text" placeholder="user123" class="field-input" />
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="password-wrapper">
          <input type="password" placeholder="••••••••" class="field-input" />
          <span class="eye-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </span>
        </div>
      </div>

      <div class="forgot-row">
        <a class="forgot-link">Forgot your password?</a>
      </div>

      <button class="login-btn">Login</button>

      <p class="signup-text">
        Don't have an account? <a class="signup-link">Create yours</a>
      </p>

    </div>
  </section>

</div>
